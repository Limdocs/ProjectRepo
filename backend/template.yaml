AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Limdocs backend stack (Cognito, DynamoDB, API, Lambda)

Parameters:
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Description: "OpenAI API Key provided during deploy"

Resources:
  LimdocsUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: Limdocs-UserPool
      AliasAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8

  LimdocsWebClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: Limdocs-Web-Client
      UserPoolId: !Ref LimdocsUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  LimdocsUsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  LimdocsCoursesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: courses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: course_id
          AttributeType: S
        - AttributeName: owner_id
          AttributeType: S
      KeySchema:
        - AttributeName: course_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: owner_courses_index
          KeySchema:
            - AttributeName: owner_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # S3 -> Lambda wiring is explicit (permission + bucket notification) instead of SAM Function
  # Events:S3 on the same bucket. SAM's implicit S3 event creates Lambda->Bucket and Bucket->Lambda
  # edges (Function env !Ref Bucket + notification target), which CloudFormation reports as a
  # circular dependency with the REST API deployment graph in this stack.
  ProcessDocumentS3InvokePermission:
    Type: AWS::Lambda::Permission
    DependsOn: ProcessDocumentFunction
    Properties:
      FunctionName: !Ref ProcessDocumentFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      # Use a constructed ARN (not !GetAtt RawUploadsBucket.Arn) so the permission does not
      # depend on the bucket resource; the bucket can then depend on this permission safely.
      SourceArn: !Sub "arn:aws:s3:::limdocs-raw-uploads-${AWS::AccountId}"
      SourceAccount: !Ref AWS::AccountId

  RawUploadsBucket:
    Type: AWS::S3::Bucket
    DependsOn: ProcessDocumentS3InvokePermission
    Properties:
      # Stable, readable name (account-scoped uniqueness for the global S3 namespace)
      BucketName: !Sub "limdocs-raw-uploads-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - Authorization
              - Content-Type
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - "*"
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt ProcessDocumentFunction.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: uploads/

  ProcessedOutputsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "limdocs-processed-outputs-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - Authorization
              - Content-Type
            AllowedMethods:
              - GET
              - PUT
            AllowedOrigins:
              - "*"

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: course_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CourseIdIndex
          KeySchema:
            - AttributeName: course_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  QuestionSetsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: question_sets
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: set_id
          AttributeType: S
        - AttributeName: course_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: set_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CourseIdCreatedAtIndex
          KeySchema:
            - AttributeName: course_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  QuestionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: questions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: question_id
          AttributeType: S
        - AttributeName: set_id
          AttributeType: S
      KeySchema:
        - AttributeName: question_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SetIdIndex
          KeySchema:
            - AttributeName: set_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  AttemptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: attempts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_name
          AttributeType: S
        - AttributeName: submitted_at
          AttributeType: S
      KeySchema:
        - AttributeName: user_name
          KeyType: HASH
        - AttributeName: submitted_at
          KeyType: RANGE

  AttemptAnswersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: attempt_answers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: attempt_id
          AttributeType: S
        - AttributeName: question_id
          AttributeType: S
      KeySchema:
        - AttributeName: attempt_id
          KeyType: HASH
        - AttributeName: question_id
          KeyType: RANGE

  LimdocsApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: LimdocsApi
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE'"
      Auth:
        DefaultAuthorizer: LimdocsAuth
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          LimdocsAuth:
            UserPoolArn: !GetAtt LimdocsUserPool.Arn
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'*'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'*'"

  CreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-create-user
      CodeUri: src/
      Handler: create_user.lambda_handler
      Runtime: python3.9
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          USERS_TABLE: !Ref LimdocsUsersTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /users
            Method: post

  CreateCourseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-create-course
      CodeUri: src/
      Handler: create_course.lambda_handler
      Runtime: python3.9
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses
            Method: post

  GetCoursesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-get-courses
      CodeUri: src/
      Handler: get_courses.lambda_handler
      Runtime: python3.9
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          INDEX_NAME: owner_courses_index
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /users/{userId}/courses
            Method: get

  GenerateUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-generate-upload-url
      CodeUri: src/
      Handler: generate_upload_url.lambda_handler
      Runtime: python3.9
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          DOCUMENTS_TABLE: !Ref DocumentsTable
          UPLOAD_BUCKET: !Ref RawUploadsBucket
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/upload-url
            Method: post

  ProcessDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-process-document
      CodeUri: src/
      Handler: process_document.lambda_handler
      Runtime: python3.9
      Timeout: 300
      MemorySize: 512
      # LabRole must include:
      # - s3:GetObject on RawUploadsBucket objects
      # - s3:HeadObject on RawUploadsBucket (size gate before Textract)
      # - s3:PutObject on ProcessedOutputsBucket objects
      # - textract:AnalyzeDocument or textract:DetectDocumentText
      # - dynamodb:UpdateItem on DocumentsTable
      ReservedConcurrentExecutions: 2
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          PROCESSED_BUCKET: !Ref ProcessedOutputsBucket
          # Same physical bucket as RawUploadsBucket; use !Sub (not !Ref RawUploadsBucket) so the
          # function does not depend on the bucket resource. That breaks the Bucket<->Lambda cycle
          # when NotificationConfiguration on the bucket references this function.
          UPLOAD_BUCKET: !Sub "limdocs-raw-uploads-${AWS::AccountId}"
          OPENAI_API_KEY: !Ref OpenAIApiKey
          OPENAI_MODEL_NAME: "gpt-4.1-mini"
      # S3 trigger: see RawUploadsBucket.NotificationConfiguration and ProcessDocumentS3InvokePermission

  GetCourseDocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-get-course-documents
      CodeUri: src/
      Handler: get_course_documents.lambda_handler
      Runtime: python3.9
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INDEX_NAME: CourseIdIndex
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/materials
            Method: get

  DeleteCourseDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-delete-course-document
      CodeUri: src/
      Handler: delete_document.lambda_handler
      Runtime: python3.9
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          DOCUMENTS_TABLE: !Ref DocumentsTable
          UPLOAD_BUCKET: !Ref RawUploadsBucket
          PROCESSED_BUCKET: !Ref ProcessedOutputsBucket
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/documents/{documentId}
            Method: delete

  DeleteCourseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-delete-course
      CodeUri: src/
      Handler: delete_course.lambda_handler
      Runtime: python3.9
      Timeout: 30
      # LabRole must include dynamodb/s3 on courses, documents, question_sets,
      # questions, attempts, attempt_answers (Query, DeleteItem, BatchWriteItem).
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          DOCUMENTS_TABLE: !Ref DocumentsTable
          QUESTION_SETS_TABLE: !Ref QuestionSetsTable
          QUESTIONS_TABLE: !Ref QuestionsTable
          ATTEMPTS_TABLE: !Ref AttemptsTable
          ATTEMPT_ANSWERS_TABLE: !Ref AttemptAnswersTable
          UPLOAD_BUCKET: !Ref RawUploadsBucket
          PROCESSED_BUCKET: !Ref ProcessedOutputsBucket
          INDEX_NAME: CourseIdIndex
          QUESTION_SETS_COURSE_INDEX: CourseIdCreatedAtIndex
          QUESTIONS_SET_INDEX: SetIdIndex
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}
            Method: delete

  GenerateQuestionsWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-generate-questions-worker
      CodeUri: src/
      Handler: generate_questions.worker_handler
      Runtime: python3.9
      Timeout: 300
      MemorySize: 512
      ReservedConcurrentExecutions: 2
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          QUESTIONS_TABLE: !Ref QuestionsTable
          QUESTION_SETS_TABLE: !Ref QuestionSetsTable
          DOCUMENTS_TABLE: !Ref DocumentsTable
          PROCESSED_BUCKET: !Ref ProcessedOutputsBucket
          OPENAI_API_KEY: !Ref OpenAIApiKey
          OPENAI_MODEL_NAME: "gpt-4.1-mini"

  GenerateQuestionsWorkerAsyncConfig:
    Type: AWS::Lambda::EventInvokeConfig
    Properties:
      FunctionName: !Ref GenerateQuestionsWorkerFunction
      Qualifier: $LATEST
      MaximumRetryAttempts: 0

  GenerateQuestionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-generate-questions
      CodeUri: src/
      Handler: generate_questions.api_handler
      Runtime: python3.9
      Timeout: 30
      MemorySize: 512
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref GenerateQuestionsWorkerFunction
      # IAM check: LabRole must include lambda:InvokeFunction on the worker ARN.
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          QUESTIONS_TABLE: !Ref QuestionsTable
          QUESTION_SETS_TABLE: !Ref QuestionSetsTable
          DOCUMENTS_TABLE: !Ref DocumentsTable
          PROCESSED_BUCKET: !Ref ProcessedOutputsBucket
          WORKER_FUNCTION_NAME: !Ref GenerateQuestionsWorkerFunction
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/generate-quiz
            Method: post

  GetQuestionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-get-questions
      CodeUri: src/
      Handler: get_questions.lambda_handler
      Runtime: python3.9
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          QUESTION_SETS_TABLE: !Ref QuestionSetsTable
          QUESTIONS_TABLE: !Ref QuestionsTable
          QUESTION_SETS_COURSE_INDEX: CourseIdCreatedAtIndex
          QUESTIONS_SET_INDEX: SetIdIndex
      Events:
        ListQuestionSets:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/question-sets
            Method: get
        GetQuestionSet:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/question-sets/{setId}
            Method: get
        DeleteQuestionSet:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/question-sets/{setId}
            Method: delete

  SubmitAttemptFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-submit-attempt
      CodeUri: src/
      Handler: submit_attempt.lambda_handler
      Runtime: python3.9
      # LabRole must include dynamodb:GetItem/Query on question_sets and questions,
      # and dynamodb:PutItem/BatchWriteItem on attempts and attempt_answers.
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          QUESTION_SETS_TABLE: !Ref QuestionSetsTable
          QUESTIONS_TABLE: !Ref QuestionsTable
          ATTEMPTS_TABLE: !Ref AttemptsTable
          ATTEMPT_ANSWERS_TABLE: !Ref AttemptAnswersTable
          QUESTIONS_SET_INDEX: SetIdIndex
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/question-sets/{setId}/attempts
            Method: post

  GetCourseAttemptsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-get-course-attempts
      CodeUri: src/
      Handler: get_course_attempts.lambda_handler
      Runtime: python3.9
      # LabRole must include dynamodb:Query on attempts table.
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          ATTEMPTS_TABLE: !Ref AttemptsTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/attempts
            Method: get

  GetAttemptAnswersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-get-attempt-answers
      CodeUri: src/
      Handler: get_attempt_answers.lambda_handler
      Runtime: python3.9
      # LabRole must include dynamodb:Query on attempts and attempt_answers tables.
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          ATTEMPTS_TABLE: !Ref AttemptsTable
          ATTEMPT_ANSWERS_TABLE: !Ref AttemptAnswersTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/attempts/{attemptId}/answers
            Method: get

  DeleteAttemptFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: limdocs-delete-attempt
      CodeUri: src/
      Handler: delete_attempt.lambda_handler
      Runtime: python3.9
      # LabRole must include dynamodb:Query, DeleteItem, BatchWriteItem on attempts and attempt_answers.
      Role: !Sub "arn:aws:iam::${AWS::AccountId}:role/LabRole"
      Environment:
        Variables:
          COURSES_TABLE: !Ref LimdocsCoursesTable
          ATTEMPTS_TABLE: !Ref AttemptsTable
          ATTEMPT_ANSWERS_TABLE: !Ref AttemptAnswersTable
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref LimdocsApi
            Path: /courses/{courseId}/attempts/{attemptId}
            Method: delete

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref LimdocsUserPool

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt LimdocsUserPool.Arn

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref LimdocsWebClient

  UsersTableName:
    Description: Users DynamoDB table name
    Value: !Ref LimdocsUsersTable

  UsersTableArn:
    Description: Users DynamoDB table ARN
    Value: !GetAtt LimdocsUsersTable.Arn

  CoursesTableName:
    Description: Courses DynamoDB table name
    Value: !Ref LimdocsCoursesTable

  CoursesTableArn:
    Description: Courses DynamoDB table ARN
    Value: !GetAtt LimdocsCoursesTable.Arn

  ApiUrl:
    Description: Base URL for Limdocs API
    Value: !Sub "https://${LimdocsApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  RawUploadsBucketName:
    Description: S3 bucket name for raw document uploads (pre-signed URL target)
    Value: !Ref RawUploadsBucket

  ProcessedOutputsBucketName:
    Description: S3 bucket for storing Textract extracted text and AI generated content
    Value: !Ref ProcessedOutputsBucket

  DocumentsTableName:
    Description: DynamoDB table name for document metadata
    Value: !Ref DocumentsTable

  QuestionSetsTableName:
    Description: DynamoDB table name for generated question sets
    Value: !Ref QuestionSetsTable

  QuestionsTableName:
    Description: DynamoDB table name for generated questions
    Value: !Ref QuestionsTable

  AttemptsTableName:
    Description: DynamoDB table name for quiz attempt summaries
    Value: !Ref AttemptsTable

  AttemptAnswersTableName:
    Description: DynamoDB table name for per-question attempt answers
    Value: !Ref AttemptAnswersTable

  GenerateQuestionsWorkerFunctionName:
    Description: Async quiz generation worker Lambda (not API-exposed)
    Value: !Ref GenerateQuestionsWorkerFunction
